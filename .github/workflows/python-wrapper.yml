name: Python Wrapper
on:
  pull_request:
    branches:
      - master
    paths:
      - 'bindings/python/**'
      - '.github/workflows/python-wrapper.yml'
  push:
    branches:
      - master
    paths:
      - 'bindings/python/**'
      - '.github/workflows/python-wrapper.yml'
env:
  JULIA_NUM_THREADS: 2
jobs:
  test:
    name: Python ${{ matrix.python }} - ${{ matrix.os }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python:
          - '3.x'
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    defaults:
      run:
        working-directory: bindings/python
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
      - uses: julia-actions/cache@v3
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: bindings/python/pyproject.toml
      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest
      - name: Develop against local TestParticle.jl
        # The published wrapper resolves TestParticle from the Julia registry.
        # In this monorepo we instead point it at the local checkout so the
        # wrapper is tested against the in-repo source. This writes an
        # environment-local override and leaves the packaged juliapkg.json clean.
        run: >-
          python -c "from juliapkg import add; add('TestParticle',
          uuid='953b605b-f162-4481-8f7f-a191c2bb40e3', dev=True,
          path=r'${{ github.workspace }}')"
      - name: Run wrapper tests
        run: python -m pytest tests -v
