name: Publish to PyPI

# Publishing uses PyPI Trusted Publishing (OIDC): no API token is stored in
# the repo. Configure a Trusted Publisher on PyPI:
#   Owner:   henry2004y
#   Repository: TestParticle.jl
#   Workflow name: publish.yml
#   Environment name: (leave blank)
#
# Python releases use a dedicated tag prefix `py-` (e.g. `py-v0.1.0`) so they
# never collide with the Julia package's `vX.Y.Z` tags managed by TagBot, and
# never fire on a Julia-only GitHub Release.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC authentication to PyPI

jobs:
  build-and-publish:
    name: Build and publish
    # Only publish on manual dispatch or a Release whose tag starts with `py-`.
    # This prevents Julia's `vX.Y.Z` releases from triggering a Python upload.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'release' &&
       startsWith(github.event.release.tag_name, 'py-'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/python
    env:
      TAG_NAME: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Verify version matches tag
        if: github.event_name == 'release'
        run: |
          tag_version="${TAG_NAME#py-}"
          tag_version="${tag_version#v}"
          pkg_version=$(grep -m 1 '^version' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Tag version:    $tag_version"
          echo "Package version: $pkg_version"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Version mismatch: tag is $tag_version but pyproject.toml is $pkg_version"
            exit 1
          fi

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: bindings/python/dist
